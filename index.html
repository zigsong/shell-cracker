<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sea Otter Rhythm - 조개 깨기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Jua&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Jua", sans-serif;
        min-height: 100vh;
        overflow: hidden;
      }

      .game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* 배경 이미지 */
      .background {
        position: absolute;
        inset: 0;
        background: url("images/game_bg.png") center center / cover no-repeat;
        z-index: 0;
      }

      /* 바다 물결 오버레이 */
      .water-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          transparent 0%,
          transparent 50%,
          rgba(0, 100, 150, 0.1) 70%,
          rgba(0, 150, 200, 0.15) 100%
        );
        z-index: 1;
        animation: waterShimmer 3s ease-in-out infinite;
      }

      @keyframes waterShimmer {
        0%,
        100% {
          opacity: 0.8;
        }
        50% {
          opacity: 1;
        }
      }

      /* 수달 캐릭터 */
      .otter-container {
        position: absolute;
        bottom: 20%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        animation: float 3s ease-in-out infinite;
      }

      .otter {
        width: 400px;
        height: auto;
        filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.3));
        animation: bob 2s ease-in-out infinite;
      }

      /* 둥둥 떠다니는 애니메이션 */
      @keyframes float {
        0%,
        100% {
          transform: translateX(-50%) translateY(0) rotate(-2deg);
        }
        25% {
          transform: translateX(-48%) translateY(-15px) rotate(0deg);
        }
        50% {
          transform: translateX(-50%) translateY(-8px) rotate(2deg);
        }
        75% {
          transform: translateX(-52%) translateY(-20px) rotate(0deg);
        }
      }

      @keyframes bob {
        0%,
        100% {
          transform: scaleY(1);
        }
        50% {
          transform: scaleY(0.98);
        }
      }

      /* 물결 효과 */
      .wave {
        position: absolute;
        bottom: 15%;
        left: 50%;
        transform: translateX(-50%);
        width: 350px;
        height: 60px;
        z-index: 5;
      }

      .wave-ring {
        position: absolute;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        animation: ripple 2.5s ease-out infinite;
      }

      .wave-ring:nth-child(1) {
        animation-delay: 0s;
      }
      .wave-ring:nth-child(2) {
        animation-delay: 0.8s;
      }
      .wave-ring:nth-child(3) {
        animation-delay: 1.6s;
      }

      @keyframes ripple {
        0% {
          width: 100px;
          height: 30px;
          left: calc(50% - 50px);
          top: 50%;
          opacity: 0.6;
        }
        100% {
          width: 300px;
          height: 80px;
          left: calc(50% - 150px);
          top: 30%;
          opacity: 0;
        }
      }

      /* 타이틀 */
      .title-container {
        position: absolute;
        top: 12%;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 20;
      }

      .game-title {
        font-family: "Press Start 2P", monospace;
        font-size: 2rem;
        color: #fff;
        text-shadow:
          4px 4px 0 #2980b9,
          6px 6px 0 #1a5276,
          0 0 30px rgba(52, 152, 219, 0.8),
          0 0 60px rgba(52, 152, 219, 0.5);
        margin-bottom: 15px;
        animation: titlePulse 2s ease-in-out infinite;
      }

      .game-subtitle {
        font-size: 1.5rem;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        letter-spacing: 2px;
        white-space: nowrap;
      }

      @keyframes titlePulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.02);
        }
      }

      /* 시작 버튼 */
      .start-btn {
        position: absolute;
        top: 42%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 100;
        padding: 25px 70px;
        font-family: "Press Start 2P", monospace;
        font-size: 1.2rem;
        color: #fff;
        background: transparent;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.2s ease;
        animation: bounce 1s ease-in-out infinite;
      }

      .start-btn:hover {
        transform: translate(-50%, -50%) translateY(-2px);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
      }

      .start-btn:active {
        transform: translate(-50%, -50%) translateY(2px);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translate(-50%, -50%) translateY(0);
        }
        50% {
          transform: translate(-50%, -50%) translateY(-5px);
        }
      }

      .start-btn.hidden {
        display: none;
      }

      /* 음악 인디케이터 */
      .music-indicator {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 30;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 15px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 25px;
        color: #fff;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      .music-indicator:hover {
        background: rgba(0, 0, 0, 0.7);
      }

      .music-bars {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 16px;
      }

      .music-bar {
        width: 3px;
        background: #3cdc8c;
        border-radius: 2px;
        animation: musicBar 0.8s ease-in-out infinite;
      }

      .music-bar:nth-child(1) {
        height: 6px;
        animation-delay: 0s;
      }
      .music-bar:nth-child(2) {
        height: 10px;
        animation-delay: 0.15s;
      }
      .music-bar:nth-child(3) {
        height: 14px;
        animation-delay: 0.3s;
      }
      .music-bar:nth-child(4) {
        height: 8px;
        animation-delay: 0.45s;
      }

      .music-indicator.paused .music-bar {
        animation: none;
        height: 4px;
        opacity: 0.5;
      }

      @keyframes musicBar {
        0%,
        100% {
          transform: scaleY(1);
        }
        50% {
          transform: scaleY(0.4);
        }
      }

      /* 물방울 효과 */
      .bubble {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(255, 255, 255, 0.8),
          rgba(255, 255, 255, 0.1)
        );
        animation: rise linear infinite;
        z-index: 2;
      }

      @keyframes rise {
        0% {
          transform: translateY(0) scale(1);
          opacity: 0.6;
        }
        100% {
          transform: translateY(-100vh) scale(0.5);
          opacity: 0;
        }
      }

      /* ─── 인트로 → 게임 전환 ─── */
      .intro-layer {
        transition: opacity 0.6s ease;
      }

      .intro-layer.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      /* ─── 게임 화면 ─── */
      .game-screen {
        position: absolute;
        inset: 0;
        z-index: 50;
        display: none;
        opacity: 0;
        transition: opacity 0.6s ease;
      }

      .game-screen.active {
        display: block;
        opacity: 1;
      }

      /* 스프라이트 캐릭터 */
      .sprite-character {
        position: absolute;
        bottom: 25%;
        left: 50%;
        transform: translateX(-50%);
        width: 320px;
        height: 167px;
        background-image: url("images/sprite_success.png");
        background-size: 640px 335px;
        background-position: 0 0;
        background-repeat: no-repeat;
        image-rendering: auto;
        filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
        animation: characterFloat 3s ease-in-out infinite;
      }

      @keyframes characterFloat {
        0%, 100% {
          transform: translateX(-50%) translateY(0);
        }
        50% {
          transform: translateX(-50%) translateY(-12px);
        }
      }

      /* ─── 일시정지 버튼 ─── */
      .pause-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 60;
        width: 48px;
        height: 48px;
        background: rgba(0, 0, 0, 0.5);
        border: none;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        transition: background 0.2s;
      }

      .pause-btn:hover {
        background: rgba(0, 0, 0, 0.7);
      }

      .pause-btn .pause-bar {
        width: 4px;
        height: 18px;
        background: #fff;
        border-radius: 2px;
      }

      /* ─── 일시정지 모달 ─── */
      .pause-overlay {
        position: absolute;
        inset: 0;
        z-index: 200;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .pause-overlay.active {
        display: flex;
        opacity: 1;
      }

      .pause-modal {
        background: rgba(10, 40, 70, 0.95);
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        padding: 40px 50px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        transform: scale(0.9);
        transition: transform 0.3s ease;
      }

      .pause-overlay.active .pause-modal {
        transform: scale(1);
      }

      .pause-modal h2 {
        font-family: "Press Start 2P", monospace;
        font-size: 1.2rem;
        color: #fff;
        margin-bottom: 35px;
        text-shadow: 0 0 20px rgba(52, 152, 219, 0.8);
      }

      .pause-modal-buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .pause-modal-btn {
        padding: 15px 40px;
        font-family: "Jua", sans-serif;
        font-size: 1.2rem;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .pause-modal-btn:hover {
        transform: translateY(-2px);
      }

      .pause-modal-btn:active {
        transform: translateY(1px);
      }

      .btn-home {
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .btn-home:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      .btn-resume {
        background: #3498db;
        color: #fff;
        box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
      }

      .btn-resume:hover {
        background: #2980b9;
        box-shadow: 0 6px 20px rgba(52, 152, 219, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <!-- 배경 -->
      <div class="background"></div>
      <div class="water-overlay"></div>

      <!-- 물방울들 (JS로 생성) -->
      <div id="bubbles"></div>

      <!-- ─── 인트로 레이어 ─── -->
      <div class="intro-layer" id="introLayer">
        <!-- 타이틀 -->
        <div class="title-container">
          <h1 class="game-title">SEA OTTER</h1>
          <p class="game-subtitle">리듬에 맞춰 조개를 깨자!</p>
        </div>

        <!-- 수달 -->
        <div class="otter-container">
          <img src="images/main_otter.png" alt="Sea Otter" class="otter" />
        </div>

        <!-- 물결 효과 -->
        <div class="wave">
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
        </div>

        <!-- 시작 버튼 -->
        <button class="start-btn" id="startBtn">START GAME</button>
      </div>

      <!-- ─── 게임 화면 ─── -->
      <div class="game-screen" id="gameScreen">
        <button class="pause-btn" id="pauseBtn">
          <span class="pause-bar"></span>
          <span class="pause-bar"></span>
        </button>
        <div class="sprite-character" id="spriteCharacter"></div>
      </div>

      <!-- ─── 일시정지 모달 ─── -->
      <div class="pause-overlay" id="pauseOverlay">
        <div class="pause-modal">
          <h2>PAUSED</h2>
          <div class="pause-modal-buttons">
            <button class="pause-modal-btn btn-resume" id="resumeBtn">게임 계속하기</button>
            <button class="pause-modal-btn btn-home" id="homeBtn">처음으로 돌아가기</button>
          </div>
        </div>
      </div>

      <!-- 음악 인디케이터 -->
      <div class="music-indicator paused" id="musicIndicator">
        <div class="music-bars">
          <div class="music-bar"></div>
          <div class="music-bar"></div>
          <div class="music-bar"></div>
          <div class="music-bar"></div>
        </div>
      </div>
    </div>

    <script src="js/bgm.js"></script>
    <script>
      // ─── 물방울 생성 ───
      function createBubbles() {
        const container = document.getElementById("bubbles");
        for (let i = 0; i < 15; i++) {
          const bubble = document.createElement("div");
          bubble.className = "bubble";
          const size = Math.random() * 15 + 5;
          bubble.style.width = size + "px";
          bubble.style.height = size + "px";
          bubble.style.left = Math.random() * 100 + "%";
          bubble.style.bottom = "-20px";
          bubble.style.animationDuration = Math.random() * 5 + 5 + "s";
          bubble.style.animationDelay = Math.random() * 5 + "s";
          container.appendChild(bubble);
        }
      }
      createBubbles();

      // ─── 음악 UI 업데이트 ───
      function updateMusicUI() {
        const indicator = document.getElementById("musicIndicator");
        if (BGM.playing) {
          indicator.classList.remove("paused");
        } else {
          indicator.classList.add("paused");
        }
      }

      // ─── 음악 인디케이터 클릭 (토글) ───
      document
        .getElementById("musicIndicator")
        .addEventListener("click", async () => {
          if (BGM.playing) {
            BGM.pause();
          } else {
            await BGM.start();
          }
          updateMusicUI();
        });

      // ─── 스프라이트 관리 ───
      const Sprite = {
        el: null,
        // sprite_success: 2x2 그리드 (1280x669 → 표시 640x335, 프레임 320x167)
        // sprite_miss: 2x1 그리드 (1280x669 → 표시 640x669, 프레임 320x335)
        successFrames: [
          { x: 0, y: 0 },       // 1번: 기본 (조개 들고 있는 모습)
          { x: -320, y: 0 },    // 2번: HIT
          { x: 0, y: -167 },    // 3번: CRACK!
          { x: -320, y: -167 }, // 4번: 기뻐하는 모습
        ],
        missFrames: [
          { x: 30, y: 0 },      // 1번: 슬퍼하는 모습
          { x: -290, y: 0 },    // 2번: MISS!
        ],

        init() {
          this.el = document.getElementById("spriteCharacter");
        },

        showSuccess(frameIndex) {
          const frame = this.successFrames[frameIndex];
          this.el.style.backgroundImage = 'url("images/sprite_success.png")';
          this.el.style.backgroundSize = "640px 335px";
          this.el.style.width = "320px";
          this.el.style.height = "167px";
          this.el.style.backgroundPosition = frame.x + "px " + frame.y + "px";
        },

        showMiss(frameIndex) {
          const frame = this.missFrames[frameIndex];
          this.el.style.backgroundImage = 'url("images/sprite_miss.png")';
          this.el.style.backgroundSize = "640px 335px";
          this.el.style.width = "320px";
          this.el.style.height = "335px";
          this.el.style.backgroundPosition = frame.x + "px " + frame.y + "px";
        },
      };

      // ─── 게임 시작 ───
      async function startGame() {
        const introLayer = document.getElementById("introLayer");
        const gameScreen = document.getElementById("gameScreen");

        // BGM 시작
        await BGM.start();
        updateMusicUI();

        // 인트로 페이드아웃
        introLayer.classList.add("fade-out");

        // 게임 화면 페이드인
        setTimeout(() => {
          gameScreen.classList.add("active");
          // 약간의 딜레이 후 opacity 전환
          requestAnimationFrame(() => {
            gameScreen.style.opacity = "1";
          });
        }, 300);

        // 스프라이트 초기화 → 기본 캐릭터 (success 1번)
        Sprite.init();
        Sprite.showSuccess(0);
      }

      // ─── 탭(터치/클릭) 입력 처리 ───
      let tapTimer = null;
      let lastTapTime = 0;
      const gamePlaying = () =>
        document.getElementById("gameScreen").classList.contains("active") &&
        !document.getElementById("pauseOverlay").classList.contains("active");

      function handleTap() {
        if (!gamePlaying()) return;

        // 중복 호출 방지 (touchstart + click 동시 발생 차단)
        const now = Date.now();
        if (now - lastTapTime < 100) return;
        lastTapTime = now;

        // 랜덤으로 CRACK!(success 3번) 또는 MISS!(miss 2번) 표시
        if (Math.random() < 0.5) {
          Sprite.showSuccess(2);
        } else {
          Sprite.showMiss(1);
        }

        // 이전 타이머가 있으면 취소
        if (tapTimer) clearTimeout(tapTimer);

        // 300ms 후 기본 프레임(1번, index 0)으로 복귀
        tapTimer = setTimeout(() => {
          Sprite.showSuccess(0);
          tapTimer = null;
        }, 300);
      }

      document.getElementById("spriteCharacter").addEventListener("click", handleTap);

      document.getElementById("spriteCharacter").addEventListener("touchstart", handleTap, { passive: true });

      // ─── 일시정지 ───
      function pauseGame() {
        BGM.pause();
        updateMusicUI();
        const overlay = document.getElementById("pauseOverlay");
        overlay.classList.add("active");
      }

      // ─── 게임 계속하기 ───
      async function resumeGame() {
        document.getElementById("pauseOverlay").classList.remove("active");
        await BGM.start();
        updateMusicUI();
      }

      // ─── 처음으로 돌아가기 ───
      function goHome() {
        const overlay = document.getElementById("pauseOverlay");
        const gameScreen = document.getElementById("gameScreen");
        const introLayer = document.getElementById("introLayer");

        // 모달 닫기
        overlay.classList.remove("active");

        // BGM 정지
        BGM.stop();
        updateMusicUI();

        // 게임 화면 숨기기
        gameScreen.classList.remove("active");
        gameScreen.style.opacity = "0";

        // 인트로 다시 보이기
        introLayer.classList.remove("fade-out");
      }

      // ─── 이벤트 바인딩 ───
      document.getElementById("startBtn").addEventListener("click", startGame);
      document.getElementById("pauseBtn").addEventListener("click", pauseGame);
      document.getElementById("resumeBtn").addEventListener("click", resumeGame);
      document.getElementById("homeBtn").addEventListener("click", goHome);
    </script>
  </body>
</html>
