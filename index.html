<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sea Otter Rhythm - 조개 깨기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Jua&family=Fredoka+One&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Jua", sans-serif;
        min-height: 100vh;
        overflow: hidden;
      }

      .game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* 배경 이미지 */
      .background {
        position: absolute;
        inset: 0;
        background: url("images/game_bg.png") center center / cover no-repeat;
        z-index: 0;
      }

      /* 바다 물결 오버레이 */
      .water-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          transparent 0%,
          transparent 50%,
          rgba(0, 100, 150, 0.1) 70%,
          rgba(0, 150, 200, 0.15) 100%
        );
        z-index: 1;
        animation: waterShimmer 3s ease-in-out infinite;
      }

      @keyframes waterShimmer {
        0%,
        100% {
          opacity: 0.8;
        }
        50% {
          opacity: 1;
        }
      }

      /* 수달 캐릭터 */
      .otter-container {
        position: absolute;
        bottom: 20%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        animation: float 3s ease-in-out infinite;
      }

      .otter {
        width: 400px;
        height: auto;
        filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.3));
        animation: bob 2s ease-in-out infinite;
      }

      /* 둥둥 떠다니는 애니메이션 */
      @keyframes float {
        0%,
        100% {
          transform: translateX(-50%) translateY(0) rotate(-2deg);
        }
        25% {
          transform: translateX(-48%) translateY(-15px) rotate(0deg);
        }
        50% {
          transform: translateX(-50%) translateY(-8px) rotate(2deg);
        }
        75% {
          transform: translateX(-52%) translateY(-20px) rotate(0deg);
        }
      }

      @keyframes bob {
        0%,
        100% {
          transform: scaleY(1);
        }
        50% {
          transform: scaleY(0.98);
        }
      }

      /* 물결 효과 */
      .wave {
        position: absolute;
        bottom: 15%;
        left: 50%;
        transform: translateX(-50%);
        width: 350px;
        height: 60px;
        z-index: 5;
      }

      .wave-ring {
        position: absolute;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        animation: ripple 2.5s ease-out infinite;
      }

      .wave-ring:nth-child(1) {
        animation-delay: 0s;
      }
      .wave-ring:nth-child(2) {
        animation-delay: 0.8s;
      }
      .wave-ring:nth-child(3) {
        animation-delay: 1.6s;
      }

      @keyframes ripple {
        0% {
          width: 100px;
          height: 30px;
          left: calc(50% - 50px);
          top: 50%;
          opacity: 0.6;
        }
        100% {
          width: 300px;
          height: 80px;
          left: calc(50% - 150px);
          top: 30%;
          opacity: 0;
        }
      }

      /* 타이틀 */
      .title-container {
        position: absolute;
        top: 12%;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 20;
      }

      .game-title {
        font-family: "Press Start 2P", monospace;
        font-size: 2rem;
        color: #fff;
        text-shadow:
          4px 4px 0 #2980b9,
          6px 6px 0 #1a5276,
          0 0 30px rgba(52, 152, 219, 0.8),
          0 0 60px rgba(52, 152, 219, 0.5);
        margin-bottom: 15px;
        animation: titlePulse 2s ease-in-out infinite;
      }

      .game-subtitle {
        font-size: 1.5rem;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        letter-spacing: 2px;
        white-space: nowrap;
      }

      @keyframes titlePulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.02);
        }
      }

      /* 시작 버튼 */
      .start-btn {
        position: absolute;
        top: 42%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 100;
        padding: 25px 70px;
        font-family: "Press Start 2P", monospace;
        font-size: 1.2rem;
        color: #fff;
        background: transparent;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.2s ease;
        animation: bounce 1s ease-in-out infinite;
      }

      .start-btn:hover {
        transform: translate(-50%, -50%) translateY(-2px);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
      }

      .start-btn:active {
        transform: translate(-50%, -50%) translateY(2px);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translate(-50%, -50%) translateY(0);
        }
        50% {
          transform: translate(-50%, -50%) translateY(-5px);
        }
      }

      .start-btn.hidden {
        display: none;
      }

      /* 우측 상단 레벨 표시 */
      .level-badge {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 60;
        font-family: "Fredoka One", cursive;
        font-size: 1.5rem;
        color: #fff;
        text-shadow: 0 2px 8px rgba(80, 180, 255, 0.7);
        pointer-events: none;
      }

      /* ─── 리듬 안내 메시지 ─── */
      .listen-message {
        position: absolute;
        top: 22%;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Jua", sans-serif;
        font-size: 2.4rem;
        color: rgba(255, 255, 255, 0.82);
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
        pointer-events: none;
        z-index: 56;
        opacity: 0;
        transition: opacity 0.4s ease;
        white-space: nowrap;
        letter-spacing: 0.04em;
      }
      .listen-message.show {
        opacity: 1;
      }

      /* 물방울 효과 */
      .bubble {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(255, 255, 255, 0.8),
          rgba(255, 255, 255, 0.1)
        );
        animation: rise linear infinite;
        z-index: 2;
      }

      @keyframes rise {
        0% {
          transform: translateY(0) scale(1);
          opacity: 0.6;
        }
        100% {
          transform: translateY(-100vh) scale(0.5);
          opacity: 0;
        }
      }

      /* ─── 인트로 → 게임 전환 ─── */
      .intro-layer {
        transition: opacity 0.6s ease;
      }

      .intro-layer.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      /* ─── 게임 화면 ─── */
      .game-screen {
        position: absolute;
        inset: 0;
        z-index: 50;
        display: none;
        opacity: 0;
        transition: opacity 0.6s ease;
      }

      .game-screen.active {
        display: block;
        opacity: 1;
      }

      /* 스프라이트 캐릭터 */
      .sprite-character {
        position: absolute;
        bottom: 25%;
        left: 50%;
        transform: translateX(-50%);
        width: 320px;
        height: 167px;
        background-image: url("images/sprite_success.png");
        background-size: 640px 335px;
        background-position: 0 0;
        background-repeat: no-repeat;
        image-rendering: auto;
        filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
        animation: characterFloat 3s ease-in-out infinite;
      }

      @keyframes characterFloat {
        0%,
        100% {
          transform: translateX(-50%) translateY(0);
        }
        50% {
          transform: translateX(-50%) translateY(-12px);
        }
      }

      /* ─── 뮤트 버튼 ─── */
      .mute-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 60;
        width: 48px;
        height: 48px;
        background: rgba(0, 0, 0, 0.5);
        border: none;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }

      .mute-btn:hover {
        background: rgba(0, 0, 0, 0.7);
      }

      .mute-btn svg {
        width: 22px;
        height: 22px;
        fill: #fff;
      }

      /* ─── 일시정지 버튼 ─── */
      .pause-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 60;
        width: 48px;
        height: 48px;
        background: rgba(0, 0, 0, 0.5);
        border: none;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        transition: background 0.2s;
      }

      .pause-btn:hover {
        background: rgba(0, 0, 0, 0.7);
      }

      .pause-btn .pause-bar {
        width: 4px;
        height: 18px;
        background: #fff;
        border-radius: 2px;
      }

      /* ─── 일시정지 모달 ─── */
      .pause-overlay {
        position: absolute;
        inset: 0;
        z-index: 200;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .pause-overlay.active {
        display: flex;
        opacity: 1;
      }

      .pause-modal {
        background: rgba(10, 40, 70, 0.95);
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        padding: 40px 50px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        transform: scale(0.9);
        transition: transform 0.3s ease;
      }

      .pause-overlay.active .pause-modal {
        transform: scale(1);
      }

      .pause-modal h2 {
        font-family: "Press Start 2P", monospace;
        font-size: 1.2rem;
        color: #fff;
        margin-bottom: 35px;
        text-shadow: 0 0 20px rgba(52, 152, 219, 0.8);
      }

      .pause-modal-buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .pause-modal-btn {
        padding: 15px 40px;
        font-family: "Jua", sans-serif;
        font-size: 1.2rem;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .pause-modal-btn:hover {
        transform: translateY(-2px);
      }

      .pause-modal-btn:active {
        transform: translateY(1px);
      }

      .btn-home {
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .btn-home:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      .btn-resume {
        background: #3498db;
        color: #fff;
        box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
      }

      .btn-resume:hover {
        background: #2980b9;
        box-shadow: 0 6px 20px rgba(52, 152, 219, 0.6);
      }

      /* ─── 조개 레인 ─── */
      .shell-lane {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 55;
        pointer-events: none;
      }

      .shell {
        position: absolute;
        width: 100px;
        height: 140px;
        background-image: url("images/shell_types.png");
        background-size: 300px 140px;
        background-position: 0 0;
        background-repeat: no-repeat;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        transition: opacity 0.3s ease;
      }

      .shell.opened {
        background-position: -80px 0;
        clip-path: inset(0 0 0 20px);
      }

      .shell.broken {
        background-position: -200px 0;
      }

      .shell.fade-out {
        opacity: 0;
      }

      .shell.tossing {
        opacity: 0.45;
        transform: scale(0.8);
      }
      .shell.catchable {
        opacity: 1;
        transform: scale(1);
        transition:
          opacity 0.25s ease,
          transform 0.25s ease;
      }

      /* ─── 히트존 가이드 (조개 실루엣) ─── */
      .hit-zone-guide {
        position: absolute;
        top: calc(75% - 332px);
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 140px;
        background-image: url("images/shell_types.png");
        background-size: 300px 140px;
        background-position: 0 0;
        background-repeat: no-repeat;
        z-index: 54;
        pointer-events: none;
        filter: drop-shadow(0 0 6px rgba(100, 200, 255, 0.7)) brightness(1.3)
          saturate(0.2);
        animation: hitZonePulse 2s ease-in-out infinite;
        transition:
          filter 0.15s ease,
          transform 0.15s ease;
      }

      .hit-zone-guide.hittable {
        filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.95))
          drop-shadow(0 0 10px rgba(100, 200, 255, 0.9)) brightness(1.6);
        transform: translateX(-50%) scale(1.08);
        animation: none;
      }

      @keyframes hitZonePulse {
        0%,
        100% {
          opacity: 0.28;
        }
        50% {
          opacity: 0.52;
        }
      }

      /* ─── 레벨 표시 ─── */
      .level-indicator {
        position: absolute;
        top: 12%;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Jua", sans-serif;
        font-size: 3.2rem;
        color: #fff;
        text-shadow:
          1px 1px 0 #fff,
          -1px 1px 0 #fff,
          1px -1px 0 #fff,
          -1px -1px 0 #fff,
          2px 0 0 #fff,
          -2px 0 0 #fff,
          0 2px 0 #fff,
          0 -2px 0 #fff,
          2px 2px 0 rgba(255, 255, 255, 0.6),
          -2px 2px 0 rgba(255, 255, 255, 0.6);
        filter: drop-shadow(0 0 8px rgba(150, 220, 255, 1))
          drop-shadow(0 0 22px rgba(80, 180, 255, 0.85))
          drop-shadow(0 0 50px rgba(50, 140, 255, 0.5))
          drop-shadow(0 4px 6px rgba(0, 60, 170, 0.45));
        z-index: 60;
        opacity: 0;
        pointer-events: none;
        white-space: nowrap;
      }

      @keyframes levelPop {
        0% {
          opacity: 0;
          transform: translateX(-50%) scale(0.6);
        }
        20% {
          opacity: 1;
          transform: translateX(-50%) scale(1.18);
        }
        35% {
          transform: translateX(-50%) scale(0.94);
        }
        50% {
          transform: translateX(-50%) scale(1.06);
        }
        62% {
          transform: translateX(-50%) scale(1);
        }
        72% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateX(-50%) scale(1);
        }
      }

      .level-indicator.show {
        animation: levelPop 1.4s cubic-bezier(0.34, 1.5, 0.64, 1) forwards;
      }

      /* ─── HP 바 래퍼 ─── */
      .hp-bar-wrapper {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 60;
      }

      /* ─── HP 바 (개별 하트 스프라이트) ─── */
      .hp-bar {
        display: flex;
        align-items: center;
        gap: 0px;
        padding: 2px 8px;
        background: rgba(0, 0, 0, 0.38);
        border-radius: 30px;
        backdrop-filter: blur(4px);
      }

      /* sprite_hp_heart.png 1280×669px, 8프레임 (160px/프레임)
         표시 44×44px, background-size 352×184px (×0.275)
         프레임 X: 1=0, 2=-44, 3=-88, 4=-132(미사용), 5=-176, 6=-220, 7=-264, 8=-308
         수직 중앙: Y ≈ -70px */
      .hp-heart-sprite {
        width: 44px;
        height: 44px;
        overflow: hidden;
        background-image: url("images/sprite_hp_heart.png");
        background-size: 352px 184px;
        background-repeat: no-repeat;
        background-position: 0px -70px;
        flex-shrink: 0;
      }

      .hp-heart-sprite.anim-damage {
        animation: heartDmgShake 0.38s ease;
      }

      .hp-heart-sprite.anim-recover {
        animation: heartRecoverPop 0.38s ease;
      }

      @keyframes heartDmgShake {
        0% {
          transform: translateX(0) rotate(0deg);
        }
        20% {
          transform: translateX(-5px) rotate(-6deg);
        }
        45% {
          transform: translateX(5px) rotate(6deg);
        }
        65% {
          transform: translateX(-3px) rotate(-2deg);
        }
        85% {
          transform: translateX(3px) rotate(2deg);
        }
        100% {
          transform: translateX(0) rotate(0deg);
        }
      }

      @keyframes heartRecoverPop {
        0% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.25);
        }
        70% {
          transform: scale(0.9);
        }
        100% {
          transform: scale(1);
        }
      }

      /* ─── 게임오버 오버레이 ─── */
      .gameover-overlay {
        position: absolute;
        inset: 0;
        z-index: 200;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .gameover-overlay.active {
        display: flex;
        opacity: 1;
      }

      .gameover-modal {
        background: rgba(60, 10, 10, 0.95);
        border: 2px solid rgba(255, 100, 100, 0.4);
        border-radius: 20px;
        padding: 40px 50px;
        text-align: center;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.6),
          0 0 40px rgba(200, 50, 50, 0.3);
        transform: scale(0.9);
        transition: transform 0.3s ease;
      }

      .gameover-overlay.active .gameover-modal {
        transform: scale(1);
      }

      .gameover-modal h2 {
        font-family: "Press Start 2P", monospace;
        font-size: 1.4rem;
        color: #ff6b6b;
        margin-bottom: 10px;
        text-shadow: 0 0 20px rgba(255, 100, 100, 0.8);
      }

      .gameover-modal .gameover-sub {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 30px;
      }

      .gameover-modal-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* ─── 레벨 전환 플래시 ─── */
      .level-flash {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        box-shadow: inset 0 0 80px rgba(100, 200, 255, 0.55);
        z-index: 58;
        opacity: 0;
        pointer-events: none;
      }
      @keyframes levelFlash {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      .level-flash.show {
        animation: levelFlash 0.9s ease-out forwards;
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <!-- 배경 -->
      <div class="background"></div>
      <div class="water-overlay"></div>

      <!-- 물방울들 (JS로 생성) -->
      <div id="bubbles"></div>

      <!-- ─── 인트로 레이어 ─── -->
      <div class="intro-layer" id="introLayer">
        <!-- 타이틀 -->
        <div class="title-container">
          <h1 class="game-title">SEA OTTER</h1>
          <p class="game-subtitle">리듬에 맞춰 조개를 깨자!</p>
        </div>

        <!-- 수달 -->
        <div class="otter-container">
          <img src="images/main_otter.png" alt="Sea Otter" class="otter" />
        </div>

        <!-- 물결 효과 -->
        <div class="wave">
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
        </div>

        <!-- 시작 버튼 -->
        <button class="start-btn" id="startBtn">START GAME</button>
      </div>

      <!-- ─── 게임 화면 ─── -->
      <div class="game-screen" id="gameScreen">
        <button class="pause-btn" id="pauseBtn">
          <span class="pause-bar"></span>
          <span class="pause-bar"></span>
        </button>
        <button class="mute-btn" id="muteBtn" title="BGM 켜기/끄기">
          <svg id="muteBtnIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/>
          </svg>
        </button>
        <!-- HP 바 -->
        <div class="hp-bar-wrapper">
          <div class="hp-bar" id="hpBar"></div>
        </div>
        <div class="hit-zone-guide"></div>
        <div class="listen-message" id="listenMessage">LISTEN</div>
        <div class="shell-lane" id="shellLane"></div>
        <div class="sprite-character" id="spriteCharacter"></div>
      </div>

      <!-- ─── 게임오버 모달 ─── -->
      <div class="gameover-overlay" id="gameoverOverlay">
        <div class="gameover-modal">
          <h2>GAME OVER</h2>
          <p class="gameover-sub">수달은 힘들어 😢</p>
          <div class="gameover-modal-buttons">
            <button class="pause-modal-btn btn-resume" id="retryBtn">
              다시 도전하기
            </button>
            <button class="pause-modal-btn btn-home" id="gameoverHomeBtn">

    <script>
      // ─── 물방울 생성 ───
      function createBubbles() {
        const container = document.getElementById("bubbles");
        for (let i = 0; i < 15; i++) {
          const bubble = document.createElement("div");
          bubble.className = "bubble";
          const size = Math.random() * 15 + 5;
          bubble.style.width = size + "px";
          bubble.style.height = size + "px";
          bubble.style.left = Math.random() * 100 + "%";
          bubble.style.bottom = "-20px";
          bubble.style.animationDuration = Math.random() * 5 + 5 + "s";
          bubble.style.animationDelay = Math.random() * 5 + "s";
          container.appendChild(bubble);
        }
      }
      createBubbles();

      // ─── HP 시스템 ───
      // sprite_hp_heart.png: 1280×669px, 8프레임 (160px/프레임)
      // 표시 56×56px, background-size 448×234px
      // 1=full, 2=damage shake, 3=half(damaged), 4=skip,
      // 5=empty outline, 6=filling start, 7=half recover, 8=full recovered
      const HP = {
        max: 5,
        current: 5,

        F: {
          full: "-14px -70px",
          damage: "-55px -70px",
          half: "-96px -70px",
          empty: "-178px -70px",
          filling: "-218px -70px",
          halfRecover: "-259px -70px",
          fullRecover: "-298px -70px",
        },

        // 각 하트 상태: 'full' | 'half' | 'empty'
        states: [],

        init() {
          this.states = Array(this.max).fill("full");
          this._render();
        },

        _render() {
          const bar = document.getElementById("hpBar");
          bar.innerHTML = "";
          for (let i = 0; i < this.max; i++) {
            const div = document.createElement("div");
            div.className = "hp-heart-sprite";
            div.style.backgroundPosition =
              this.F[
                { full: "full", half: "half", empty: "empty" }[this.states[i]]
              ];
            bar.appendChild(div);
          }
        },

        _heart(idx) {
          return document.querySelectorAll(".hp-heart-sprite")[idx] || null;
        },

        _rightmostNonEmpty() {
          for (let i = this.max - 1; i >= 0; i--)
            if (this.states[i] !== "empty") return i;
          return -1;
        },

        _leftmostNonFull() {
          for (let i = 0; i < this.max; i++)
            if (this.states[i] !== "full") return i;
          return -1;
        },

        // miss: full → half (2→3), half → empty (2→5)
        lose() {
          const idx = this._rightmostNonEmpty();
          if (idx === -1) return;
          const h = this._heart(idx);
          if (!h) return;

          h.style.backgroundPosition = this.F.damage;
          h.classList.remove("anim-damage");
          void h.offsetWidth;
          h.classList.add("anim-damage");

          if (this.states[idx] === "full") {
            // full → half
            this.states[idx] = "half";
            setTimeout(() => {
              h.style.backgroundPosition = this.F.half;
            }, 380);
          } else {
            // half → empty
            this.states[idx] = "empty";
            setTimeout(() => {
              h.style.backgroundPosition = this.F.empty;
              if (this.states.every((s) => s === "empty")) {
                setTimeout(() => triggerGameOver(), 300);
              }
            }, 380);
          }
        },

        // hit 1번: empty → half (6→7→3)
        // hit 2번: half → full (7→8→1)
        gain() {
          const idx = this._leftmostNonFull();
          if (idx === -1) return;
          const h = this._heart(idx);
          if (!h) return;

          if (this.states[idx] === "empty") {
            // 1번째 hit: 반만 채우기
            this.states[idx] = "half";
            h.style.backgroundPosition = this.F.filling;
            h.classList.remove("anim-recover");
            void h.offsetWidth;
            h.classList.add("anim-recover");
            setTimeout(() => {
              h.style.backgroundPosition = this.F.halfRecover;
              setTimeout(() => {
                h.style.backgroundPosition = this.F.half;
              }, 200);
            }, 300);
          } else if (this.states[idx] === "half") {
            // 2번째 hit: 완전히 채우기
            this.states[idx] = "full";
            h.style.backgroundPosition = this.F.halfRecover;
            h.classList.remove("anim-recover");
            void h.offsetWidth;
            h.classList.add("anim-recover");
            setTimeout(() => {
              h.style.backgroundPosition = this.F.fullRecover;
              setTimeout(() => {
                h.style.backgroundPosition = this.F.full;
              }, 200);
            }, 300);
          }
        },
      };

      // ─── 스프라이트 관리 ───
      const Sprite = {
        el: null,
        // sprite_success: 2x2 그리드 (1280x669 → 표시 640x335, 프레임 320x167)
        // sprite_miss: 2x1 그리드 (1280x669 → 표시 640x669, 프레임 320x335)
        successFrames: [
          { x: 0, y: 0 }, // 1번: 기본 (조개 들고 있는 모습)
          { x: -320, y: 0 }, // 2번: HIT
          { x: 0, y: -167 }, // 3번: CRACK!
          { x: -320, y: -167 }, // 4번: 기뻐하는 모습
        ],
        missFrames: [
          { x: 30, y: 0 }, // 1번: 슬퍼하는 모습
          { x: -290, y: 0 }, // 2번: MISS!
        ],

        init() {
          this.el = document.getElementById("spriteCharacter");
        },

        showSuccess(frameIndex) {
          const frame = this.successFrames[frameIndex];
          this.el.style.backgroundImage = 'url("images/sprite_success.png")';
          this.el.style.backgroundSize = "640px 335px";
          this.el.style.width = "320px";
          this.el.style.height = "167px";
          this.el.style.backgroundPosition = frame.x + "px " + frame.y + "px";
        },

        showMiss(frameIndex) {
          const frame = this.missFrames[frameIndex];
          this.el.style.backgroundImage = 'url("images/sprite_miss.png")';
          this.el.style.backgroundSize = "640px 335px";
          this.el.style.width = "320px";
          this.el.style.height = "335px";
          this.el.style.backgroundPosition = frame.x + "px " + frame.y + "px";
        },
      };

      // ─── 효과음 ───

        spawnFrozenUntilTick: 0, // 레벨업 시 첫 마디 스폰 금지

        // 레벨별 스폰 패턴 ("4n" 기준, 8스텝 = 2마디 루프)
        // Phase1(인덱스 0~3, 첫 마디)에만 스폰 → Phase2(인덱스 4~7)는 모두 null
        // 스폰된 조개는 4비트 후(Phase2 시작)에 pop → 유저가 Phase2에서 hit
        LEVEL_PATTERNS: [
          null,                                                                // 0: 미사용
          [1, 1, 1, 1, null, null, null, null],                               // 1: 4박 정박
          [1, null, 1, null, null, null, null, null],                          // 2: 1·3박
          [[1, 1], null, null, null, null, null, null, null],                  // 3: 8분 연타
          [1, null, 1, 1, null, null, null, null],                            // 4: 1·3·4박
          [[1, 1, 1], null, null, null, null, null, null, null],               // 5: 셋잇단
          [1, 1, null, 1, null, null, null, null],                            // 6: 갤로핑
          [[1, null, 1], null, [1, 1], null, null, null, null, null],         // 7: 싱코+연타
          [[1, 1, null, 1], null, null, null, null, null, null, null],        // 8: 갤로핑 리듬
          [[1, null, 1, null, 1], null, null, null, null, null, null, null],  // 9: 5분할
          [[1, 1], null, [1, null, 1], null, null, null, null, null],         // 10: 복합
          [[1, 1], null, [1, 1, 1], null, null, null, null, null],            // 11: 쌍+삼연음
          [[1, 1, 1], null, [1, 1, 1], null, null, null, null, null],         // 12: 더블 삼연음
          [1, [1, 1], 1, null, null, null, null, null],                       // 13: 분산 혼합
          [[1, null, 1], [1, null, 1], null, null, null, null, null, null],   // 14: 싱코 반복
          [[1, 1, null, 1], null, [1, 1], null, null, null, null, null],      // 15: 갤로핑+쌍
          [[1, 1, 1, 1], null, null, null, null, null, null, null],           // 16: 16분 연속
          [1, [1, 1], [1, null, 1], null, null, null, null, null],            // 17: 혼합 박자
          [[1, null, 1, 1], [1, null, 1], null, null, null, null, null, null],// 18: 복잡한 분산
          [[1, 1, 1], [null, 1, 1], null, null, null, null, null, null],      // 19: 연음 이어지기
          [[1, 1], [1, null, 1], null, [1, 1], null, null, null, null],       // 20: 전박 분산
        ],

        // 레벨 → 패턴 (레벨 21부터는 10~20 순환)
        _getPattern(level) {
          if (level < this.LEVEL_PATTERNS.length) return this.LEVEL_PATTERNS[level];
          const hard = this.LEVEL_PATTERNS.slice(10);
          return hard[(level - 10) % hard.length];
        },

        start(seqStart = 0) {
          this.lane = document.getElementById("shellLane");
          this.shells = [];
          this.running = true;
          // 히트존 Y: 원래 bottom:calc(25% + 192px) 위치 → shell center 기준
          const hitZoneCenterY = window.innerHeight * 0.75 - 262;
          this.hitZoneY = hitZoneCenterY;
          this.travelDist = hitZoneCenterY + 70; // shell center starts at -70, arrives at hitZoneCenterY

          this._startSequence(1);
          this.spawnSequence.start(seqStart); // 다음 마디 경계에 정확히 시작 → BGM 동기화

          this.loop();
        },

        stop() {
          this.running = false;
          if (this.spawnSequence) {
            this.spawnSequence.stop();
            this.spawnSequence.dispose();
            this.spawnSequence = null;
          }
          if (this.animFrame) cancelAnimationFrame(this.animFrame);
          this.shells.forEach((s) => s.el.remove());
          this.shells = [];
          this.spawnFrozenUntilTick = 0; // 재시작 시 틱 초기화
          this.hitZoneY = null;
        },

        _startSequence(level) {
          if (this.spawnSequence) {
            this.spawnSequence.stop();
            this.spawnSequence.dispose();
            this.spawnSequence = null;
          }
          const pattern = this._getPattern(level);
          this.spawnSequence = new Tone.Sequence(
            (time, value) => {
              if (value === null) return;
              // 오디오 콜백에서 직접 WebAudio 스케줄 → BGM 킥과 샘플 정확도로 동기화
              PopSFX.trigger(time);
              const scheduledTick = Tone.Transport.getTicksAtTime(time);
              Tone.Draw.schedule(() => {
                if (this.running) this.spawnShell(scheduledTick);
              }, time);
            },
            pattern,
            "4n",
          );
        },

        pause() {
          this.running = false;
          if (this.animFrame) cancelAnimationFrame(this.animFrame);
        },

        resume() {
          if (this.running) return;
          this.running = true;
          this.loop();
        },

        freezeSpawnFor(beats) {
          const PPQ = Tone.Transport.PPQ || 192;
          this.spawnFrozenUntilTick = Tone.Transport.ticks + beats * PPQ;
        },

        spawnShell(spawnTick) {
          if (spawnTick < this.spawnFrozenUntilTick) return;
          const el = document.createElement("div");
          el.className = "shell";
          const startY = -140;
          const baseX = window.innerWidth / 2 - 50;
          el.style.top = startY + "px";
          el.style.left = baseX + "px";
          this.lane.appendChild(el);
          this.shells.push({
            el,
            y: startY,
            baseX,
            spawnTick,
            state: "moving",
          });
        },

        loop() {
          if (!this.running) return;

          // tick 기반 위치 계산: BPM이 바뀌어도 항상 음악 박자에 동기화
          const PPQ = Tone.Transport.PPQ || 192;
          const travelTicks = this.travelBeats * PPQ;
          const currentTick = Tone.Transport.ticks;
          const startY = -140;
          const otterCenterY = this.hitZoneY || window.innerHeight * 0.75 - 83;

          for (let i = this.shells.length - 1; i >= 0; i--) {
            const shell = this.shells[i];
            if (shell.state !== "moving") continue;

            const VISUAL_AHEAD = Math.round(0.12 * PPQ); // 오디오 대비 시각 보정
            const fraction =
              (currentTick - shell.spawnTick + VISUAL_AHEAD) / travelTicks;
            const y = startY + fraction * this.travelDist;
            shell.y = y;
            shell.el.style.top = y + "px";

            // 조개는 Phase1부터 완전히 보이며 직선 낙하
            shell.el.style.left = shell.baseX + "px";

            // 히트존 완전히 벗어나면 미스 (자동 판정)
            const shellCenterY = y + 70;
            if (shellCenterY > otterCenterY + this.hitZoneSize) {
              this.missShell(shell);
            }
          }

          // 화면 밖으로 나간 조개 정리
          for (let i = this.shells.length - 1; i >= 0; i--) {
            if (this.shells[i].y > window.innerHeight + 100) {
              this.shells[i].el.remove();
              this.shells.splice(i, 1);
            }
          }

          // 히트존 하이라이트
          const guide = document.querySelector(".hit-zone-guide");
          if (this.findHittable()) {
            guide.classList.add("hittable");
          } else {
            guide.classList.remove("hittable");
          }

          this.animFrame = requestAnimationFrame(() => this.loop());
        },

        // 히트존 타이밍(fraction≈1.0)에 있는 조개 찾기
        findHittable() {
          const PPQ = Tone.Transport.PPQ || 192;
          const travelTicks = this.travelBeats * PPQ;
          const currentTick = Tone.Transport.ticks;
          let best = null;
          let bestDist = Infinity;

          for (const shell of this.shells) {
            if (shell.state !== "moving") continue;
            const fraction = (currentTick - shell.spawnTick) / travelTicks;
            // fraction=1.0이 완벽한 타이밍, ±hitWindow 이내만 hit
            const dist = Math.abs(fraction - 1.0);
            if (dist <= this.hitWindow && dist < bestDist) {
              best = shell;
              bestDist = dist;
            }
          }
          return best;
        },

        // 히트존에 가장 가까운 조개 찾기
        findNearest() {
          const PPQ = Tone.Transport.PPQ || 192;
          const travelTicks = this.travelBeats * PPQ;
          const currentTick = Tone.Transport.ticks;
          const otterCenterY = this.hitZoneY || window.innerHeight * 0.75 - 83;
          let best = null;
          let bestDist = Infinity;

          for (const shell of this.shells) {
            if (shell.state !== "moving") continue;
            const shellCenter = shell.y + 70;
            const dist = Math.abs(shellCenter - otterCenterY);
            if (dist < bestDist) {
              best = shell;
              bestDist = dist;
            }
          }
          return best;
        },

        // 성공: 열린 조개
        openShell(shell) {
          SFX.play("hit");
          HP.gain();
          shell.state = "opened";
          shell.el.classList.add("opened");
          setTimeout(() => {
            shell.el.classList.add("fade-out");
            setTimeout(() => {
              shell.el.remove();
              const idx = this.shells.indexOf(shell);
              if (idx !== -1) this.shells.splice(idx, 1);
            }, 300);
          }, 400);
        },

        // 실패: 깨진 조개
        missShell(shell) {
          SFX.play("miss");
          HP.lose();
          shell.state = "broken";
          shell.el.classList.add("broken");
          Sprite.showMiss(1);
          setTimeout(() => Sprite.showSuccess(0), 400);
          setTimeout(() => {
            shell.el.classList.add("fade-out");
            setTimeout(() => {
              shell.el.remove();
              const idx = this.shells.indexOf(shell);
              if (idx !== -1) this.shells.splice(idx, 1);
            }, 300);
          }, 400);
        },
      };

      // ─── 레벨 시스템 ───
      const LevelSystem = {
        currentLevel: 1,
        barCount: 0,
        barsPerLevel: 2,
        barEvent: null,

        init() {
          this.currentLevel = 1;
          this.barCount = 0;
        },

        start(seqStart = 0) {
          this.barEvent = Tone.Transport.scheduleRepeat(
            (time) => {
              this.barCount++;
              if (this.barCount % this.barsPerLevel === 0) {
                this.currentLevel++;
                // 정확히 다음 마디(Phase1 시작) 시점에 새 패턴 시작
                const nextBarTime = time + Tone.Time("1m").toSeconds();
                ShellGame._startSequence(this.currentLevel);
                ShellGame.spawnSequence.start(nextBarTime);
                // 레벨 표시는 Phase1 시작 시점에 바로 표시 (오디오→비주얼 브리지)
                Tone.Draw.schedule(() => {
                  this.showLevelIndicator();
                }, nextBarTime);
              }
            },
            "1m",
            seqStart,
          );
        },

        stop() {
          if (this.barEvent !== null) {
            Tone.Transport.clear(this.barEvent);
            this.barEvent = null;
          }
          clearTimeout(this._listenTimer);
          const msg = document.getElementById("listenMessage");
          if (msg) msg.classList.remove("show");
          this.currentLevel = 1;
          this.barCount = 0;
        },

        showLevelIndicator() {
          // Phase1 동안 "리듬을 잘 들으세요" 메시지 표시 → 1마디 후 자동 숨김
          const msg = document.getElementById("listenMessage");
          if (msg) {
            msg.classList.add("show");
            const measureMs = (60000 / Tone.Transport.bpm.value) * 4;
            clearTimeout(this._listenTimer);
            this._listenTimer = setTimeout(
              () => msg.classList.remove("show"),
              measureMs,
            );
          }
        },
      };

      // ─── 게임오버 ───
      function triggerGameOver() {
        BGM.pause();
        ShellGame.stop();
        LevelSystem.stop();
        const overlay = document.getElementById("gameoverOverlay");
        overlay.style.display = "flex";
        requestAnimationFrame(() => {
          overlay.style.opacity = "1";
        });
      }

      function hideGameover() {
        const overlay = document.getElementById("gameoverOverlay");
        overlay.style.opacity = "0";
        setTimeout(() => {
          overlay.style.display = "none";
        }, 400);
      }

      // ─── 게임 시작 ───
      async function startGame() {
        const introLayer = document.getElementById("introLayer");
        const gameScreen = document.getElementById("gameScreen");

        await BGM.start();
        await PopSFX.init();

        // 레벨 초기화
        LevelSystem.init();

        // 인트로 페이드아웃
        introLayer.classList.add("fade-out");

        // 게임 화면 페이드인
        setTimeout(() => {
          gameScreen.classList.add("active");
          requestAnimationFrame(() => {
            gameScreen.style.opacity = "1";
          });
        }, 300);

        // HP 초기화
        HP.init();

        // 스프라이트 초기화 → 기본 캐릭터 (success 1번)
        Sprite.init();
        Sprite.showSuccess(0);

        // 다음 마디 경계에 맞춰 시작 → BGM과 박자 동기화
        setTimeout(() => {
          const measureSec = Tone.Time("1m").toSeconds();
          const nowSec = Tone.Transport.seconds;
          const startSec = (Math.floor(nowSec / measureSec) + 1) * measureSec;

          ShellGame.start(startSec);
          LevelSystem.start(startSec);

          // LISTEN 메시지도 Phase1 시작 시점(startSec)에 표시
          Tone.Draw.schedule(() => {
            LevelSystem.showLevelIndicator();
          }, startSec);
        }, 600);
      }

      // ─── 탭(터치/클릭) 입력 처리 ───
      let lastTapTime = 0;
      let tapResetTimer = null;
      const gamePlaying = () =>
        document.getElementById("gameScreen").classList.contains("active") &&
        !document.getElementById("pauseOverlay").classList.contains("active");

      function handleTap(e) {
        if (!gamePlaying()) return;
        if (e.target.closest("button")) return; // 버튼 클릭은 무시

        // 중복 호출 방지 (touchstart + click 동시 발생 차단)
        const now = Date.now();
        if (now - lastTapTime < 100) return;
        lastTapTime = now;

        if (tapResetTimer) clearTimeout(tapResetTimer);

        // 히트존에 조개가 있는지 확인
        const shell = ShellGame.findHittable();
        if (shell) {
          // 성공! → 열린 조개 + CRACK 수달
          ShellGame.openShell(shell);
          Sprite.showSuccess(2);
        } else {
          // 실패! → 히트존 안/지나친 조개만 미스 (멀리 오는 다음 조개는 영향 없음)
          const nearest = ShellGame.findNearest();
          if (nearest) {
            const hitZoneY =
              ShellGame.hitZoneY || window.innerHeight * 0.75 - 262;
            const nearestCenterY = nearest.y + 70;
            if (nearestCenterY >= hitZoneY - ShellGame.hitZoneSize) {
              ShellGame.missShell(nearest);
            }
          }
          Sprite.showMiss(1);
        }

        // 400ms 후 기본 포즈로 복귀
        tapResetTimer = setTimeout(() => {
          Sprite.showSuccess(0);
          tapResetTimer = null;
        }, 400);
      }

      document
        .getElementById("gameScreen")
        .addEventListener("click", handleTap);

      document
        .getElementById("gameScreen")
        .addEventListener("touchstart", handleTap, { passive: true });

      // ─── 일시정지 ───
      function pauseGame() {
        BGM.pause();
        ShellGame.pause();
        document.getElementById("pauseOverlay").classList.add("active");
      }

      // ─── 게임 계속하기 ───
      async function resumeGame() {
        document.getElementById("pauseOverlay").classList.remove("active");
        await BGM.start(); // Transport 먼저 재개
        ShellGame.resume(); // Transport 살아있는 상태에서 loop 재시작
      }

      // ─── 처음으로 돌아가기 ───
      function goHome() {
        document.getElementById("pauseOverlay").classList.remove("active");

        BGM.stop();
        ShellGame.stop();
        LevelSystem.stop();

        const gameScreen = document.getElementById("gameScreen");
        gameScreen.classList.remove("active");
        gameScreen.style.opacity = "0";

        document.getElementById("introLayer").classList.remove("fade-out");
      }

      // ─── 이벤트 바인딩 ───
      document.getElementById("startBtn").addEventListener("click", startGame);
      document.getElementById("pauseBtn").addEventListener("click", pauseGame);
      document
        .getElementById("resumeBtn")
        .addEventListener("click", resumeGame);
      document.getElementById("homeBtn").addEventListener("click", goHome);

      document
        .getElementById("retryBtn")
        .addEventListener("click", async () => {
          hideGameover();
          BGM.stop();        // Transport 완전 리셋 (0으로)
          ShellGame.stop();  // 혹시 남은 조개 정리
          LevelSystem.stop();
          await startGame(); // 처음부터 새 게임
        });

      // ─── BGM 뮤트 버튼 ───
      let _bgmMuted = false;
      const MUTE_ICON = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/>`;
      const UNMUTE_ICON = `<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`;
      document.getElementById("muteBtn").addEventListener("click", () => {
        _bgmMuted = !_bgmMuted;
        document.getElementById("muteBtnIcon").innerHTML = _bgmMuted ? UNMUTE_ICON : MUTE_ICON;
        BGM.setVolume(_bgmMuted ? 0 : 100);
      });
      document
        .getElementById("gameoverHomeBtn")
        .addEventListener("click", () => {
          hideGameover();
          const gameScreen = document.getElementById("gameScreen");
          gameScreen.classList.remove("active");
          gameScreen.style.opacity = "0";
          document.getElementById("introLayer").classList.remove("fade-out");
        });
    </script>
  </body>
</html>
