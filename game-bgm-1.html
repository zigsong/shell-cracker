<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game BGM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #0c0c14;
  color: #e0e0e8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Pixel grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(60,220,140,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(60,220,140,0.03) 1px, transparent 1px);
  background-size: 24px 24px;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 360px;
}

.card {
  background: #14141f;
  border: 2px solid #2a2a3a;
  border-radius: 20px;
  padding: 32px 28px;
  box-shadow: 0 0 60px rgba(60,220,140,0.06);
}

.title {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.7rem;
  color: #3cdc8c;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: 0.05em;
  text-shadow: 0 0 12px rgba(60,220,140,0.4);
}

.subtitle {
  text-align: center;
  font-size: 0.7rem;
  color: #555568;
  margin-bottom: 28px;
}

/* Visualizer */
.vis-wrap {
  height: 80px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 3px;
  margin-bottom: 24px;
  background: #0c0c14;
  border-radius: 12px;
  padding: 12px 10px;
  border: 1px solid #1e1e2e;
}

.vb {
  width: 5px;
  min-height: 3px;
  border-radius: 2px;
  background: #3cdc8c;
  transition: height 0.08s ease;
  opacity: 0.5;
}
.vb.on { opacity: 1; }

/* Play button */
.play-area {
  display: flex;
  justify-content: center;
  margin-bottom: 24px;
}

.play-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 2px solid #3cdc8c;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  color: #3cdc8c;
}
.play-btn:hover {
  background: rgba(60,220,140,0.1);
  box-shadow: 0 0 24px rgba(60,220,140,0.2);
  transform: scale(1.05);
}
.play-btn.on {
  background: #3cdc8c;
  color: #0c0c14;
  box-shadow: 0 0 32px rgba(60,220,140,0.35);
}
.play-btn svg { width: 28px; height: 28px; }

/* Volume */
.vol-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.vol-icon { color: #555568; flex-shrink: 0; }
.vol-icon svg { width: 16px; height: 16px; display: block; }

input[type="range"] {
  -webkit-appearance: none;
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: #2a2a3a;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #3cdc8c;
  cursor: pointer;
  box-shadow: 0 0 6px rgba(60,220,140,0.4);
}

.status {
  text-align: center;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.5rem;
  color: #555568;
  letter-spacing: 0.04em;
}
.status.on { color: #3cdc8c; }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="title">♪ GAME BGM ♪</div>
    <div class="subtitle">반복되는 중독성 게임 음악</div>

    <div class="vis-wrap" id="vis"></div>

    <div class="play-area">
      <button class="play-btn" id="btn" onclick="toggle()">
        <svg id="iPlay" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
      </button>
    </div>

    <div class="vol-row">
      <span class="vol-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></span>
      <input type="range" min="0" max="100" value="55" oninput="setVol(this.value)">
    </div>

    <div class="status" id="stat">PRESS PLAY</div>
  </div>
</div>

<script>
let playing = false;
let inited = false;

// ─── Instruments ───
let mainVol, leadSynth, bassSynth, arpSynth, kickSynth, hatSynth, snareSynth;
let leadPart, bassPart, arpPart, drumLoop;

function init() {
  if (inited) return;
  inited = true;

  mainVol = new Tone.Volume(-10).toDestination();

  const reverb = new Tone.Reverb({ decay: 1.2, wet: 0.15 }).connect(mainVol);
  const delay = new Tone.FeedbackDelay({ delayTime: '8n.', feedback: 0.15, wet: 0.12 }).connect(reverb);

  // ─── Lead: catchy square wave melody ───
  leadSynth = new Tone.Synth({
    oscillator: { type: 'square' },
    envelope: { attack: 0.01, decay: 0.15, sustain: 0.3, release: 0.15 },
    volume: -12,
  }).connect(delay);

  // ─── Bass: punchy triangle ───
  bassSynth = new Tone.MonoSynth({
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.01, decay: 0.2, sustain: 0.5, release: 0.1 },
    filterEnvelope: { attack: 0.01, decay: 0.1, sustain: 0.3, release: 0.1, baseFrequency: 200, octaves: 1.5 },
    volume: -8,
  }).connect(reverb);

  // ─── Arp: 8-bit pulse ───
  arpSynth = new Tone.Synth({
    oscillator: { type: 'pulse', width: 0.3 },
    envelope: { attack: 0.005, decay: 0.1, sustain: 0.1, release: 0.08 },
    volume: -20,
  }).connect(delay);

  // ─── Drums ───
  kickSynth = new Tone.MembraneSynth({
    pitchDecay: 0.04, octaves: 5, volume: -10,
    envelope: { attack: 0.005, decay: 0.2, sustain: 0, release: 0.1 },
  }).connect(mainVol);

  hatSynth = new Tone.NoiseSynth({
    noise: { type: 'white' },
    envelope: { attack: 0.002, decay: 0.05, sustain: 0, release: 0.03 },
    volume: -22,
  }).connect(mainVol);

  snareSynth = new Tone.NoiseSynth({
    noise: { type: 'pink' },
    envelope: { attack: 0.003, decay: 0.12, sustain: 0, release: 0.05 },
    volume: -16,
  }).connect(mainVol);

  Tone.Transport.bpm.value = 140;
  Tone.Transport.swing = 0;

  // ─── Catchy lead melody (2 bar loop) ───
  // 짧고 반복적이면서 기억에 남는 패턴
  leadPart = new Tone.Sequence((time, note) => {
    if (note !== null) {
      leadSynth.triggerAttackRelease(note, '16n', time);
    }
  }, [
    // Bar 1 — 경쾌한 상승 프레이즈
    'E5', 'E5', null, 'G5',
    'A5', null, 'G5', 'E5',
    'D5', null, 'E5', null,
    'C5', null, null, null,

    // Bar 2 — 변형 + 하강
    'E5', 'E5', null, 'G5',
    'A5', null, 'B5', 'A5',
    'G5', null, 'E5', null,
    'D5', null, null, null,
  ], '16n');

  // ─── Bass pattern (2 bar loop) ───
  bassPart = new Tone.Sequence((time, note) => {
    if (note !== null) {
      bassSynth.triggerAttackRelease(note, '8n', time);
    }
  }, [
    // Bar 1
    'C3', null, null, 'C3',
    null, null, 'C3', null,
    'E3', null, null, 'E3',
    null, null, 'E3', null,

    // Bar 2
    'F3', null, null, 'F3',
    null, null, 'F3', null,
    'G3', null, null, 'G3',
    null, null, 'G2', null,
  ], '16n');

  // ─── Arp pattern (1 bar loop, fast) ───
  arpPart = new Tone.Sequence((time, note) => {
    if (note !== null) {
      arpSynth.triggerAttackRelease(note, '32n', time);
    }
  }, [
    'C6', 'E6', 'G6', 'E6',
    'C6', 'E6', 'G6', 'E6',
    'C6', 'E6', 'G6', 'E6',
    'C6', 'E6', 'G6', 'E6',
  ], '16n');

  // ─── Drum pattern (1 bar loop) ───
  drumLoop = new Tone.Loop((time) => {
    const pos = Tone.Transport.position;
    const parts = pos.split(':');
    const beat = parseInt(parts[1]);
    const sub = parseInt(parts[2]);

    // Kick: beats 0, 2 + offbeat patterns
    if (beat === 0 && sub === 0) kickSynth.triggerAttackRelease('C1', '16n', time);
    if (beat === 1 && sub === 2) kickSynth.triggerAttackRelease('C1', '16n', time, 0.6);
    if (beat === 2 && sub === 0) kickSynth.triggerAttackRelease('C1', '16n', time);
    if (beat === 3 && sub === 2) kickSynth.triggerAttackRelease('C1', '16n', time, 0.5);

    // Snare: beats 1, 3
    if ((beat === 1 || beat === 3) && sub === 0) snareSynth.triggerAttackRelease('16n', time, 0.7);

    // Hi-hat: every 8th
    if (sub === 0 || sub === 2) hatSynth.triggerAttackRelease('32n', time, 0.3 + (sub === 0 ? 0.2 : 0));
  }, '16n');
}

// ─── Visualizer ───
const visEl = document.getElementById('vis');
const NUM = 36;
const barEls = [];
for (let i = 0; i < NUM; i++) {
  const b = document.createElement('div');
  b.className = 'vb';
  visEl.appendChild(b);
  barEls.push(b);
}

let rafId;
function animate() {
  if (!playing) {
    barEls.forEach(b => { b.style.height = '3px'; b.classList.remove('on'); });
    return;
  }
  const t = Tone.now();
  barEls.forEach((b, i) => {
    const p = (i / NUM) * Math.PI * 6 + t * 8;
    const w1 = Math.sin(p) * 0.35;
    const w2 = Math.sin(p * 0.6 + t * 3) * 0.25;
    const n = (Math.random() - 0.5) * 0.2;
    const center = 1 - Math.abs(i - NUM / 2) / (NUM / 2) * 0.5;
    const v = Math.max(0.05, (0.35 + w1 + w2 + n) * center);
    b.style.height = (v * 56) + 'px';
    b.classList.add('on');

    const bright = 50 + v * 40;
    b.style.background = `hsl(152, 75%, ${bright}%)`;
  });
  rafId = requestAnimationFrame(animate);
}

// ─── Controls ───
async function toggle() {
  init();
  await Tone.start();

  if (playing) {
    Tone.Transport.pause();
    playing = false;
    document.getElementById('iPlay').style.display = '';
    document.getElementById('iPause').style.display = 'none';
    document.getElementById('btn').classList.remove('on');
    document.getElementById('stat').textContent = 'PAUSED';
    document.getElementById('stat').classList.remove('on');
    cancelAnimationFrame(rafId);
    barEls.forEach(b => { b.style.height = '3px'; b.classList.remove('on'); });
  } else {
    leadPart.start(0);
    bassPart.start(0);
    arpPart.start(0);
    drumLoop.start(0);
    Tone.Transport.start();
    playing = true;
    document.getElementById('iPlay').style.display = 'none';
    document.getElementById('iPause').style.display = '';
    document.getElementById('btn').classList.add('on');
    document.getElementById('stat').textContent = '♪ NOW PLAYING ♪';
    document.getElementById('stat').classList.add('on');
    animate();
  }
}

function setVol(v) {
  if (mainVol) mainVol.volume.value = Tone.gainToDb(v / 100);
}
</script>
</body>
</html>
